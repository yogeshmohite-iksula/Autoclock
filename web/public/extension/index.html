<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AutoClock · Chrome Extension Demo</title>
  <link rel="icon" href="data:," />
  <style>
    /* ============================================================
       AutoClock — Chrome Extension Click-through Demo
       Brand: Ink Charcoal #0F172A · Signal Red #DC2626 · Inter
       The amber EXTENSION MOCKUP top banner is the only persistent
       presenter chrome. Everything else lets the user click directly
       on the extension popup and explore freely.
       ============================================================ */
    :root {
      --ink: #0F172A;
      --red: #DC2626;
      --slate: #64748B;
      --cloud: #F1F5F9;
      --border: #E2E8F0;
      --surface: #fff;
      --warn-border: #B45309;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background:
        radial-gradient(1200px 600px at 50% -10%, #f6f7fb 0%, #e9ecf3 60%, #dde2eb 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ------- top amber banner (the one piece of presenter chrome) ------- */
    .demo-banner {
      background: linear-gradient(90deg, #FBBF24 0%, #F59E0B 50%, #FBBF24 100%);
      color: #422006;
      border-bottom: 1px solid var(--warn-border);
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .demo-banner .lede {
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      opacity: 0.85;
    }

    /* ------- page-head: brand + screen title + minimal inline links ------- */
    .page-head {
      max-width: 1320px;
      margin: 18px auto 6px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
    }
    .page-head .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.01em;
    }
    .page-head .brand .dot {
      width: 26px; height: 26px;
      border-radius: 8px;
      background: var(--ink);
      position: relative;
    }
    .page-head .brand .dot::after {
      content: '';
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      top: 5px; right: 5px;
      background: var(--red);
    }
    .page-head .brand .rd { color: var(--red); }
    .page-head h1 {
      font-size: 13px;
      font-family: ui-monospace, Menlo, monospace;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--slate);
      margin: 0;
    }

    /* Subtle inline links — these let presenters reach E06 / E07 (no in-popup
       button leads to them) and restart the demo. NOT a boxed control strip. */
    .extras {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: ui-monospace, Menlo, monospace;
      font-size: 11px;
      color: var(--slate);
    }
    .extras .hint {
      margin-right: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      opacity: 0.7;
    }
    .extras button {
      font: inherit;
      background: transparent;
      color: var(--slate);
      border: 0;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 6px;
      transition: color 120ms, background 120ms;
    }
    .extras button:hover,
    .extras button:focus-visible {
      color: var(--ink);
      background: rgba(15, 23, 42, 0.05);
      outline: none;
    }
    .extras .sep {
      color: #CBD5E1;
      user-select: none;
    }
    /* Tiny "click anywhere to enable sound" hint, shown only until the
       first user gesture (browser autoplay policy). nav.js hides it. */
    #sound-hint {
      position: fixed;
      top: 36px; right: 14px;
      background: #1f2937;
      color: #f1f5f9;
      font: 600 11px/1 ui-monospace, Menlo, monospace;
      padding: 6px 10px;
      border-radius: 6px;
      letter-spacing: 0.04em;
      box-shadow: 0 6px 16px -8px rgba(15, 23, 42, 0.35);
      pointer-events: none;
      animation: hint-pulse 2.4s ease-in-out infinite;
      z-index: 50;
    }
    @keyframes hint-pulse {
      0%,100% { opacity: 0.88; transform: translateY(0); }
      50%     { opacity: 1;    transform: translateY(-2px); }
    }

    /* ------- iframe stage ------- */
    .stage {
      flex: 1;
      display: grid;
      place-items: start center;
      padding: 14px 24px 32px;
      min-height: 0;
    }
    .frame-shell {
      width: min(1280px, 100%);
      background: transparent;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 24px 70px -28px rgba(15, 23, 42, 0.35);
    }
    .frame-shell iframe {
      width: 100%;
      height: 860px;
      border: 0;
      background: #F4F5F7;
      display: block;
    }

    @media (max-width: 760px) {
      .page-head h1 { display: none; }
      .extras .hint { display: none; }
      .frame-shell iframe { height: 700px; }
    }
  </style>
</head>
<body>
  <!-- Presenter banner — the ONE piece of demo chrome that stays. -->
  <div class="demo-banner" role="status">
    <span>EXTENSION MOCKUP</span>
    <span class="lede">a reminder fires · click "Log now" to open the popup · static visual mockup</span>
  </div>

  <!-- Tiny hint, hidden after the first user click (browser autoplay policy
       requires a gesture before the chime can play). -->
  <div id="sound-hint">🔔 click anywhere to enable chime</div>

  <header class="page-head">
    <div class="brand">
      <span class="dot" aria-hidden="true"></span>
      <span>Auto<span class="rd">Clock</span></span>
    </div>
    <h1 id="screen-title">E06 · Reminder</h1>
    <!-- Inline text links (not a box). Reminder / Offline reach screens that
         have no in-popup button leading to them; Replay chime is for demos
         where the presenter wants to re-trigger the sound. -->
    <nav class="extras" aria-label="Other states">
      <span class="hint">Jump to:</span>
      <button id="ctrl-reminder" type="button">Reminder</button>
      <span class="sep">·</span>
      <button id="ctrl-offline"  type="button">Offline</button>
      <span class="sep">·</span>
      <button id="ctrl-chime"    type="button">🔔 Replay chime</button>
      <span class="sep">·</span>
      <button id="ctrl-restart"  type="button">↺ Restart</button>
    </nav>
  </header>

  <div class="stage">
    <div class="frame-shell">
      <iframe
        id="frame"
        src="frames/e06-reminder.html"
        title="AutoClock extension mockup"
        loading="eager"
      ></iframe>
    </div>
  </div>

  <script src="nav.js"></script>
</body>
</html>
