<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AutoClock · Chrome Extension Demo</title>
  <link rel="icon" href="data:," />
  <style>
    /* ============================================================
       AutoClock — Chrome Extension Click-through Demo
       Brand: Ink Charcoal #0F172A · Signal Red #DC2626 · Inter
       Presenter "chrome" is intentionally visually distinct from
       the product so nobody mistakes it for the extension UI.
       ============================================================ */
    :root {
      --ink: #0F172A;
      --red: #DC2626;
      --slate: #64748B;
      --cloud: #F1F5F9;
      --border: #E2E8F0;
      --surface: #fff;
      --warn-bg: #FEF3C7;
      --warn-border: #B45309;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background:
        radial-gradient(1200px 600px at 50% -10%, #f6f7fb 0%, #e9ecf3 60%, #dde2eb 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ------- top demo banner (presenter chrome) ------- */
    .demo-banner {
      background: linear-gradient(90deg, #FBBF24 0%, #F59E0B 50%, #FBBF24 100%);
      color: #422006;
      border-bottom: 1px solid var(--warn-border);
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .demo-banner .lede {
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      opacity: 0.85;
    }

    /* ------- page title strip ------- */
    .page-head {
      max-width: 1320px;
      margin: 24px auto 6px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .page-head .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.01em;
    }
    .page-head .brand .dot {
      width: 26px; height: 26px;
      border-radius: 8px;
      background: var(--ink);
      position: relative;
    }
    .page-head .brand .dot::after {
      content: '';
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      top: 5px; right: 5px;
      background: var(--red);
    }
    .page-head .brand .rd { color: var(--red); }
    .page-head h1 {
      font-size: 14px;
      font-family: ui-monospace, Menlo, monospace;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--slate);
      margin: 0;
    }
    .page-head .what {
      flex: 1;
      text-align: right;
      font-size: 12px;
      color: var(--slate);
      font-family: ui-monospace, Menlo, monospace;
    }

    /* ------- iframe stage ------- */
    .stage {
      flex: 1;
      display: grid;
      place-items: start center;
      padding: 14px 24px 24px;
      min-height: 0;
    }
    .frame-shell {
      width: min(1280px, 100%);
      background: transparent;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 24px 70px -28px rgba(15, 23, 42, 0.35);
    }
    .frame-shell iframe {
      width: 100%;
      height: 820px;
      border: 0;
      background: #F4F5F7;
      display: block;
    }

    /* ------- presenter control strip ------- */
    .ctrl {
      max-width: 1320px;
      margin: 4px auto 24px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px dashed #94A3B8;       /* dashed = visually distinct from the product */
      border-radius: 12px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      font-family: ui-monospace, Menlo, monospace;
      font-size: 12px;
      color: var(--ink);
    }
    .ctrl .label {
      color: var(--slate);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding-right: 10px;
      border-right: 1px solid var(--border);
      margin-right: 6px;
    }
    .ctrl button {
      font: inherit;
      background: var(--cloud);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .ctrl button:hover {
      background: #E8EDF4;
      border-color: #94A3B8;
    }
    .ctrl button:focus-visible {
      outline: 2px solid var(--red);
      outline-offset: 2px;
    }
    .ctrl .nav { display: inline-flex; gap: 6px; }
    .ctrl .dots {
      display: inline-flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .ctrl .dots button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
    }
    .ctrl .dots button .pip {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #CBD5E1;
    }
    .ctrl .dots button[aria-current="true"] {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .ctrl .dots button[aria-current="true"] .pip { background: var(--red); }
    .ctrl .restart {
      margin-left: auto;
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .ctrl .restart:hover { background: #1f2937; }

    @media (max-width: 760px) {
      .page-head .what { display: none; }
      .frame-shell iframe { height: 700px; }
      .ctrl .label { display: none; }
    }
  </style>
</head>
<body>
  <!-- Presenter banner — intentionally amber so nobody confuses this with
       the live AutoClock web app, which also has its own demo ribbon. -->
  <div class="demo-banner" role="status">
    <span>EXTENSION MOCKUP</span>
    <span class="lede">click-through demo of the AutoClock Chrome extension · screens E02–E07</span>
  </div>

  <header class="page-head">
    <div class="brand">
      <span class="dot" aria-hidden="true"></span>
      <span>Auto<span class="rd">Clock</span></span>
    </div>
    <h1 id="screen-title">E02 · Today</h1>
    <div class="what">/extension/ · static visual mockup · not the real installable extension</div>
  </header>

  <div class="stage">
    <div class="frame-shell">
      <iframe
        id="frame"
        src="frames/e02-today.html"
        title="AutoClock extension mockup"
        loading="eager"
      ></iframe>
    </div>
  </div>

  <nav class="ctrl" aria-label="Demo controls">
    <span class="label">Demo</span>
    <span class="nav">
      <button id="ctrl-prev" type="button" aria-label="Previous screen">◂ Back</button>
      <button id="ctrl-next" type="button" aria-label="Next screen">Next ▸</button>
    </span>
    <span class="dots" role="tablist" aria-label="Jump to screen">
      <button data-jump="0" type="button" role="tab"><span class="pip"></span>Today</button>
      <button data-jump="1" type="button" role="tab"><span class="pip"></span>Add Entry</button>
      <button data-jump="2" type="button" role="tab"><span class="pip"></span>Close Day</button>
      <button data-jump="3" type="button" role="tab"><span class="pip"></span>Sync Result</button>
      <button data-jump="4" type="button" role="tab"><span class="pip"></span>Reminder</button>
      <button data-jump="5" type="button" role="tab"><span class="pip"></span>Offline</button>
    </span>
    <button id="ctrl-restart" class="restart" type="button">↺ Restart</button>
  </nav>

  <script src="nav.js"></script>
</body>
</html>
