isplay = isErr ? 'inline-flex' : 'none';\n      document.getElementById('err-block').style.display = isErr ? 'block' : 'none';\n      document.getElementById('save-btn').disabled = isErr;\n    }\n    function toggleDd() {\n      const panel = document.getElementById('dd-panel');\n      const dd = document.getElementById('task-dd');\n      const t = document.getElementById('t-dd');\n      const open = panel.style.display !== 'none';\n      panel.style.display = open ? 'none' : 'block';\n      dd.classList.toggle('open', !open);\n      dd.setAttribute('aria-expanded', !open);\n      t.setAttribute('aria-pressed', !open);\n    }\n    function toggleProjDd() {\n      const panel = document.getElementById('proj-dd-panel');\n      const dd = document.getElementById('proj-dd');\n      const t = document.getElementById('t-proj');\n      const open = panel.style.display !== 'none';\n      panel.style.display = open ? 'none' : 'block';\n      dd.classList.toggle('open', !open);\n      dd.setAttribute('aria-expanded', !open);\n      t.setAttribute('aria-pressed', !open);\n    }\n    // live char count\n    const desc = document.getElementById('desc');\n    const cc = document.getElementById('char-count');\n    desc.addEventListener('input', () => {\n      cc.textContent = `${desc.value.length} / 600`;\n      cc.classList.toggle('warn', desc.value.length > 540);\n    });\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
