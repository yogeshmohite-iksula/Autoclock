   function setState(s) {\n      const isOk = s === 'allok';\n      document.getElementById('t-partial').setAttribute('aria-pressed', !isOk);\n      document.getElementById('t-allok').setAttribute('aria-pressed', isOk);\n\n      const hero = document.getElementById('hero');\n      const reassure = document.getElementById('reassure');\n      const heroMark = document.getElementById('hero-mark');\n      const heroH1Main = document.getElementById('hero-h1-main');\n      const heroH1Acc = document.getElementById('hero-h1-acc');\n      const heroSub = document.getElementById('hero-sub');\n      const countNum = document.getElementById('count-num');\n\n      const gmailPill = document.getElementById('gmail-pill');\n      const gmailSub = document.getElementById('gmail-sub');\n      const gmailErr = document.getElementById('gmail-err');\n      const gmailRetry = document.getElementById('gmail-retry');\n      const gmailRow = document.getElementById('res-gmail');\n\n      if (isOk) {\n        hero.classList.add('all-ok');\n        reassure.classList.add('all-ok');\n        heroMark.innerHTML = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4.5 4.5L19 7.5\"/><\u002Fsvg>';\n        heroH1Main.textContent = 'Your day is';\n        heroH1Acc.textContent = ' synced.';\n        heroSub.textContent = 'All three writes landed. Gmail draft is waiting.';\n        countNum.textContent = '3';\n        document.getElementById('reassure-text').textContent = 'All three writes complete · posted at 5:42 PM IST';\n\n        // gmail row becomes ok\n        gmailRow.classList.remove('failed');\n        gmailPill.setAttribute('data-tone', 'ok');\n        gmailPill.innerHTML = '<span class=\"pip\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4.5 4.5L19 7.5\"/><\u002Fsvg><\u002Fspan><span>Synced<\u002Fspan>';\n        gmailSub.innerHTML = 'EOD draft to <span class=\"key\">priya.iyer@iksula.com<\u002Fspan>';\n        gmailErr.style.display = 'none';\n        gmailRetry.outerHTML = '<a class=\"open-link\" href=\"#\" onclick=\"event.preventDefault()\">Open <span class=\"ext\">↗<\u002Fspan><\u002Fa>';\n      } else {\n        hero.classList.remove('all-ok');\n        reassure.classList.remove('all-ok');\n        heroMark.innerHTML = '<svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2L1.5 21h21L12 2zm0 6.5l7.4 12.5H4.6L12 8.5zm-1 4v4h2v-4h-2zm0 5v2h2v-2h-2z\"/><\u002Fsvg>';\n        heroH1Main.textContent = 'Mostly synced —';\n        heroH1Acc.textContent = ' one thing needs a retry.';\n        heroSub.textContent = \"Jira and your Sheet are in. Gmail couldn't be reached.\";\n        countNum.textContent = '2';\n        document.getElementById('reassure-text').textContent = 'Slots are saved locally — nothing is lost.';\n\n        // restore gmail failed row\n        gmailRow.classList.add('failed');\n        gmailPill.setAttribute('data-tone', 'fail');\n        gmailPill.innerHTML = '<span class=\"pip\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 6l12 12M18 6L6 18\"/><\u002Fsvg><\u002Fspan><span>Failed<\u002Fspan>';\n        gmailSub.textContent = \"Couldn't reach Gmail — usually clears in seconds.\";\n        gmailErr.style.display = 'inline-flex';\n        // restore retry button\n        const action = gmailRow.querySelector('.row-action');\n        action.innerHTML = '<button class=\"retry-btn\" id=\"gmail-retry\" onclick=\"retryGmail()\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 0 1 15.5-6.2L21 8M21 3v5h-5M21 12a9 9 0 0 1-15.5 6.2L3 16M3 21v-5h5\"/><\u002Fsvg><span>Retry<\u002Fspan><\u002Fbutton>';\n      }\n    }\n\n    function retryGmail() {\n      const btn = document.getElementById('gmail-retry');\n      const pill = document.getElementById('gmail-pill');\n      const sub = document.getElementById('gmail-sub');\n      const err = document.getElementById('gmail-err');\n      if (!btn) return;\n      // retrying state\n      btn.classList.add('retrying'); btn.disabled = true;\n      btn.innerHTML = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"animation:spin .8s linear infinite;\"><path d=\"M3 12a9 9 0 0 1 15.5-6.2L21 8M21 3v5h-5M21 12a9 9 0 0 1-15.5 6.2L3 16M3 21v-5h5\"/><\u002Fsvg><span>Retrying…<\u002Fspan>';\n      pill.setAttribute('data-tone','retrying');\n      pill.innerHTML = '<span class=\"pip\"><span class=\"spin\"><\u002Fspan><\u002Fspan><span>Retrying…<\u002Fspan>';\n      sub.textContent = 'Attempt 2 of 3 · contacting Gmail…';\n      err.style.display = 'none';\n      // simulate success\n      setTimeout(() => setState('allok'), 1600);\n    }\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
