<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AutoClock · Connect your accounts</title>
<link rel="stylesheet" href="autoclock-theme.css" />
<style>
  html, body { height: 100%; }
  body {
    background: var(--ac-bg);
    color: var(--ac-text);
    overflow: hidden;
  }
  #app { height: 100vh; width: 100vw; }

  /* ---------- chrome (corners) ---------- */
  .chrome {
    position: absolute; inset: 0;
    pointer-events: none;
    padding: var(--ac-space-8);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr auto;
    z-index: 2;
  }
  .chrome > * { pointer-events: auto; }
  .chrome-tl { grid-column: 1; grid-row: 1; }
  .chrome-tr { grid-column: 2; grid-row: 1; justify-self: end; }
  .chrome-bl { grid-column: 1; grid-row: 3; align-self: end; }
  .chrome-br { grid-column: 2; grid-row: 3; align-self: end; justify-self: end; }

  .wordmark {
    display: inline-flex; align-items: center; gap: 9px;
    font-weight: var(--ac-weight-black);
    font-size: var(--ac-text-base);
    letter-spacing: -0.01em;
    color: var(--ac-text);
  }
  .wordmark .dot {
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--ac-secondary);
    box-shadow: 0 0 0 4px rgba(220,38,38,.10);
  }

  .status-line {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--ac-font-mono);
    font-size: var(--ac-text-xs);
    color: var(--ac-text);
    letter-spacing: 0.02em;
    font-weight: var(--ac-weight-bold);
    text-shadow: 0 1px 2px rgba(255,255,255,.55);
  }
  .status-line .pulse {
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--ac-success);
    box-shadow: 0 0 0 0 rgba(16,185,129,.6);
    animation: pulse 2.4s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(16,185,129,.55); }
    70%  { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
    100% { box-shadow: 0 0 0 0   rgba(16,185,129,0); }
  }

  .footer-line {
    font-size: var(--ac-text-xs);
    color: var(--ac-text);
    font-weight: var(--ac-weight-semibold);
    text-shadow: 0 1px 2px rgba(255,255,255,.55);
  }
  .footer-line strong { color: var(--ac-primary); font-weight: var(--ac-weight-black); }

  .user-chip {
    display: inline-flex; align-items: center; gap: 9px;
    font-size: var(--ac-text-xs);
    color: var(--ac-text);
    font-weight: var(--ac-weight-bold);
    text-shadow: 0 1px 2px rgba(255,255,255,.55);
  }
  .user-chip .avatar {
    width: 22px; height: 22px; border-radius: 999px;
    background: var(--ac-primary);
    color: #fff;
    display: grid; place-items: center;
    font-family: var(--ac-font-sans);
    font-size: 10px; font-weight: var(--ac-weight-black);
    text-shadow: none;
  }
  .user-chip .signout {
    text-decoration: none;
    color: var(--ac-text-muted);
    font-family: var(--ac-font-mono);
    font-size: 11px;
    margin-left: 4px;
    border: 1px solid var(--ac-border-strong);
    padding: 3px 7px;
    border-radius: 6px;
    background: rgba(255,255,255,.6);
    text-shadow: none;
    transition: var(--ac-transition);
  }
  .user-chip .signout:hover { background: var(--ac-surface); color: var(--ac-text); }

  /* ---------- backgrounds ---------- */
  .bg-layer { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  .bg-glow {
    background:
      radial-gradient(circle at 50% 30%, rgba(255,255,255,.85) 0%, rgba(255,255,255,0) 55%),
      radial-gradient(circle at 12% 88%, rgba(37,99,235,.05)  0%, rgba(37,99,235,0)  45%),
      radial-gradient(circle at 88% 92%, rgba(220,38,38,.045) 0%, rgba(220,38,38,0) 45%);
  }
  .bg-dots {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(15,23,42,.08) 1px, transparent 0);
    background-size: 22px 22px;
    -webkit-mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, #000 30%, transparent 85%);
            mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, #000 30%, transparent 85%);
  }
  .bg-grid {
    background-image:
      linear-gradient(rgba(15,23,42,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15,23,42,.05) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 30%, transparent 80%);
            mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 30%, transparent 80%);
  }
  .bg-rings {
    background:
      repeating-radial-gradient(
        circle at 50% 50%,
        transparent 0,
        transparent 79px,
        rgba(15,23,42,.05) 79px,
        rgba(15,23,42,.05) 80px
      );
    -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 0%, rgba(0,0,0,.85) 35%, transparent 75%);
            mask-image: radial-gradient(circle at 50% 50%, #000 0%, rgba(0,0,0,.85) 35%, transparent 75%);
  }
  .bg-mesh {
    background:
      radial-gradient(40% 35% at 18% 22%, rgba(37,99,235,.10) 0%, transparent 60%),
      radial-gradient(35% 30% at 82% 18%, rgba(220,38,38,.08) 0%, transparent 60%),
      radial-gradient(50% 40% at 50% 95%, rgba(15,23,42,.08) 0%, transparent 65%),
      radial-gradient(30% 25% at 90% 70%, rgba(16,185,129,.06) 0%, transparent 60%);
    filter: saturate(.95);
  }
  .bg-photo {
    background-image: url('assets/bg-soft.png');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
  }
  .bg-photo-overlay {
    background:
      radial-gradient(ellipse 60% 55% at 50% 45%, rgba(255,255,255,.50) 0%, rgba(255,255,255,0) 70%);
  }

  /* ---------- center stack ---------- */
  .center {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    z-index: 1;
    padding: 32px;
    overflow: auto;
  }
  .stack {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: var(--ac-space-5);
  }

  /* ---------- header (above card) ---------- */
  .head {
    text-align: center;
    margin-bottom: 4px;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--ac-font-mono);
    font-size: 11px;
    font-weight: var(--ac-weight-bold);
    letter-spacing: var(--ac-tracking-wide);
    text-transform: uppercase;
    color: var(--ac-text-muted);
  }
  .eyebrow .dash { width: 18px; height: 1px; background: var(--ac-border-strong); }
  .h1 {
    margin-top: 10px;
    font-size: 28px;
    font-weight: var(--ac-weight-black);
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: var(--ac-text);
  }
  .sub {
    margin-top: 6px;
    font-size: var(--ac-text-sm);
    color: var(--ac-text-muted);
  }

  /* ---------- stepper ---------- */
  .stepper {
    display: grid;
    grid-template-columns: auto 1fr auto 1fr auto;
    align-items: center;
    margin: 20px auto 0;
    max-width: 460px;
  }
  .step {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .step .bubble {
    width: 32px; height: 32px;
    border-radius: 999px;
    display: grid; place-items: center;
    font-family: var(--ac-font-mono);
    font-size: 12px;
    font-weight: var(--ac-weight-bold);
    background: var(--ac-surface);
    color: var(--ac-text-muted);
    border: 1px solid var(--ac-border-strong);
    transition: var(--ac-transition);
  }
  .step.done .bubble {
    background: var(--ac-success);
    color: #fff;
    border-color: var(--ac-success);
  }
  .step.active .bubble {
    background: var(--ac-primary);
    color: #fff;
    border-color: var(--ac-primary);
    box-shadow: 0 0 0 5px rgba(15,23,42,.08);
  }
  .step .lbl {
    font-size: 11px;
    font-weight: var(--ac-weight-bold);
    color: var(--ac-text-muted);
    letter-spacing: 0.02em;
  }
  .step.done .lbl, .step.active .lbl { color: var(--ac-text); }
  .step-bar {
    height: 2px;
    background: var(--ac-border);
    border-radius: 2px;
    margin: 0 8px;
    align-self: center;
    margin-bottom: 18px; /* sits roughly aligned with bubble centers */
    position: relative;
    overflow: hidden;
  }
  .step-bar .fill {
    position: absolute; inset: 0;
    background: var(--ac-success);
    width: 0%;
    transition: width 600ms cubic-bezier(.22,.61,.36,1);
  }

  /* ---------- main card ---------- */
  .card {
    background: var(--ac-surface);
    border: 1px solid var(--ac-border);
    border-radius: 20px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.6) inset,
      0 1px 2px rgba(15,23,42,.04),
      0 24px 60px -28px rgba(15,23,42,.25);
    padding: 22px;
    position: relative;
  }
  .card::before {
    content: ""; position: absolute; left: 28px; right: 28px; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(15,23,42,.18), transparent);
  }

  /* connection rows */
  .rows { display: flex; flex-direction: column; gap: 12px; }
  .row {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 16px;
    border-radius: 14px;
    border: 1px solid var(--ac-border);
    background: var(--ac-bg);
    transition: var(--ac-transition);
  }
  .row.connected {
    background: rgba(16,185,129,.05);
    border-color: rgba(16,185,129,.22);
  }
  .row.expired {
    background: rgba(245,158,11,.06);
    border-color: rgba(245,158,11,.30);
  }

  .row .ico {
    width: 44px; height: 44px;
    border-radius: 11px;
    display: grid; place-items: center;
    font-weight: var(--ac-weight-black);
    font-size: 17px;
    color: #fff;
    box-shadow: 0 2px 6px -2px rgba(15,23,42,.25);
    position: relative;
    flex: none;
  }
  .row .ico--jira   { background: linear-gradient(135deg, #2684FF 0%, #0052CC 100%); }
  .row .ico--google { background: linear-gradient(135deg, #4285F4 0%, #34A853 35%, #FBBC05 65%, #EA4335 100%); }
  /* small status pip in corner of icon */
  .row .ico .pip {
    position: absolute;
    bottom: -3px; right: -3px;
    width: 16px; height: 16px;
    border-radius: 999px;
    background: var(--ac-surface);
    border: 2px solid var(--ac-surface);
    display: grid; place-items: center;
    font-size: 9px;
    font-family: var(--ac-font-mono);
    color: var(--ac-text-muted);
  }
  .row.connected .ico .pip {
    background: var(--ac-success);
    color: #fff;
    font-weight: var(--ac-weight-black);
  }
  .row.expired .ico .pip {
    background: var(--ac-warning);
    color: #fff;
    font-weight: var(--ac-weight-black);
  }

  .row .body { min-width: 0; }
  .row .title-line {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .row .title {
    font-size: 15px;
    font-weight: var(--ac-weight-bold);
    color: var(--ac-text);
    letter-spacing: -0.01em;
  }
  .row .tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--ac-font-mono);
    font-size: 10.5px;
    font-weight: var(--ac-weight-bold);
    padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid currentColor;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .row .tag.req { color: var(--ac-text-muted); border-color: var(--ac-border-strong); }
  .row .tag.ok { color: var(--ac-success); background: rgba(16,185,129,.08); border-color: rgba(16,185,129,.25); }
  .row .tag.warn { color: var(--ac-warning); background: rgba(245,158,11,.10); border-color: rgba(245,158,11,.30); }

  .row .reason {
    margin-top: 4px;
    font-size: 13px;
    color: var(--ac-text-muted);
    line-height: 1.45;
  }
  .row .conn-info {
    margin-top: 7px;
    display: flex; align-items: center; gap: 8px;
    font-family: var(--ac-font-mono);
    font-size: 12px;
    color: var(--ac-text-subtle);
  }
  .row .conn-info .email { color: var(--ac-text-muted); font-weight: var(--ac-weight-semibold); }
  .row .conn-info .check {
    width: 14px; height: 14px; border-radius: 999px;
    background: var(--ac-success); color: #fff;
    display: grid; place-items: center;
    font-size: 9px; font-weight: var(--ac-weight-black);
  }
  .row .conn-info .warn-dot {
    width: 14px; height: 14px; border-radius: 999px;
    background: var(--ac-warning); color: #fff;
    display: grid; place-items: center;
    font-size: 9px; font-weight: var(--ac-weight-black);
  }

  /* buttons inside rows */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px;
    height: 38px;
    padding: 0 16px;
    border-radius: 10px;
    font-family: var(--ac-font-sans);
    font-size: 13px;
    font-weight: var(--ac-weight-semibold);
    border: 1px solid transparent;
    cursor: pointer;
    transition: var(--ac-transition);
    white-space: nowrap;
  }
  .btn--primary {
    background: var(--ac-primary);
    color: var(--ac-primary-contrast);
    border-color: var(--ac-primary);
    box-shadow: 0 4px 12px -6px rgba(15,23,42,.5);
  }
  .btn--primary:hover:not(:disabled) { background: var(--ac-primary-hover); }
  .btn--primary:active:not(:disabled) { transform: translateY(1px); }
  .btn--primary:disabled {
    background: var(--ac-n-200);
    color: var(--ac-text-subtle);
    border-color: var(--ac-n-200);
    cursor: not-allowed;
    box-shadow: none;
  }
  .btn--ghost {
    background: var(--ac-surface);
    color: var(--ac-text);
    border-color: var(--ac-border-strong);
  }
  .btn--ghost:hover { background: var(--ac-n-100); }
  .btn--warn {
    background: var(--ac-warning);
    color: #fff;
    border-color: var(--ac-warning);
  }
  .btn--warn:hover { filter: brightness(.95); }

  .btn .spin {
    width: 14px; height: 14px;
    border-radius: 999px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    opacity: .8;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* reassurance row */
  .reassure {
    margin: 16px 4px 0;
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 12.5px;
    color: var(--ac-text-muted);
    line-height: 1.5;
  }
  .reassure .shield {
    width: 16px; height: 16px; border-radius: 4px;
    background: var(--ac-n-100);
    color: var(--ac-text-muted);
    display: grid; place-items: center;
    font-family: var(--ac-font-mono);
    font-size: 10px;
    font-weight: var(--ac-weight-black);
    flex: none;
    margin-top: 1px;
  }

  /* footer (inside card) — finish */
  .card-footer {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px dashed var(--ac-border-strong);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .card-footer .meta {
    font-family: var(--ac-font-mono);
    font-size: 11px;
    color: var(--ac-text-subtle);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .card-footer .meta .dotty {
    width: 5px; height: 5px; border-radius: 999px;
    background: var(--ac-success);
  }
  .card-footer .meta.not-ready .dotty { background: var(--ac-text-subtle); }

  .finish-btn {
    height: 44px;
    padding: 0 22px;
    font-size: 14px;
  }
  .finish-btn .arrow { font-family: var(--ac-font-mono); font-weight: 700; }

  /* helper hint row below card */
  .skip-line {
    text-align: center;
    font-size: 12px;
    color: var(--ac-text-muted);
    font-family: var(--ac-font-mono);
  }
  .skip-line a {
    color: var(--ac-text);
    text-decoration: underline;
    text-decoration-color: var(--ac-border-strong);
    text-underline-offset: 3px;
  }
  .skip-line a:hover { text-decoration-color: var(--ac-primary); }

  /* entry animation */
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .head, .card, .skip-line, .chrome > * { animation: rise 600ms ease both; }
  .card { animation-delay: 100ms; }
  .skip-line { animation-delay: 200ms; }
  .chrome > * { animation-delay: 260ms; }

  /* short viewports — hide bottom chrome */
  @media (max-height: 760px) {
    .chrome-bl, .chrome-br { display: none; }
  }

  /* tablet */
  @media (max-width: 640px) {
    .chrome { padding: 18px; }
    .center { padding: 20px; }
    .stack { gap: var(--ac-space-4); }
    .h1 { font-size: 24px; }
    .card { padding: 18px; border-radius: 18px; }
    .row { padding: 14px; gap: 12px; grid-template-columns: 40px 1fr auto; }
    .row .ico { width: 40px; height: 40px; font-size: 16px; }
    .stepper { max-width: 100%; }
    .card-footer { flex-direction: column-reverse; align-items: stretch; gap: 10px; }
    .card-footer .meta { justify-content: center; }
    .finish-btn { width: 100%; }
  }

  /* phone */
  @media (max-width: 480px) {
    .chrome { padding: 14px; }
    .h1 { font-size: 22px; }
    .row {
      grid-template-columns: 40px 1fr;
      grid-template-rows: auto auto;
      row-gap: 12px;
    }
    .row .body { grid-column: 2; grid-row: 1; }
    .row .ico { grid-column: 1; grid-row: 1; }
    .row .btn-cell { grid-column: 1 / -1; grid-row: 2; }
    .row .btn { width: 100%; }
    .step .lbl { font-size: 10px; }
    .step .bubble { width: 28px; height: 28px; font-size: 11px; }
  }
  @media (max-width: 360px) {
    .domain-tag { display: none; }
    .step .lbl { display: none; }
  }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "scenario": "jira-only",
      "background": "photo",
      "showSkip": true,
      "userName": "Aarav Mehta",
      "userEmail": "aarav.mehta@iksula.com"
    }/*EDITMODE-END*/;

    /* IST live clock */
    function useISTClock() {
      const [now, setNow] = useState(() => new Date());
      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(id);
      }, []);
      const hm = new Intl.DateTimeFormat('en-IN', {
        timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', hour12: false
      }).format(now);
      const s = new Intl.DateTimeFormat('en-IN', {
        timeZone: 'Asia/Kolkata', second: '2-digit'
      }).format(now);
      return { hm, s };
    }

    function initials(name) {
      return name.split(/\s+/).filter(Boolean).slice(0, 2).map(s => s[0].toUpperCase()).join('');
    }

    /* scenarios → connection state */
    function deriveState(scenario) {
      // returns { jira: 'connected'|'idle'|'connecting'|'expired', google: same }
      switch (scenario) {
        case 'none':           return { jira: 'idle', google: 'idle' };
        case 'jira-only':      return { jira: 'connected', google: 'idle' };
        case 'connecting':     return { jira: 'connected', google: 'connecting' };
        case 'all-connected':  return { jira: 'connected', google: 'connected' };
        case 'reconnect':      return { jira: 'connected', google: 'expired' };
        default:               return { jira: 'idle', google: 'idle' };
      }
    }

    function Stepper({ jira, google }) {
      const s1Done = jira === 'connected';
      const s2Done = google === 'connected';
      const s2Active = s1Done && !s2Done && google !== 'connecting';
      const s2Connecting = google === 'connecting';
      const s3Active = s1Done && s2Done;

      // fill bars: first bar after step1, second after step2
      const fill1 = s1Done ? 100 : 0;
      const fill2 = s2Done ? 100 : (s2Connecting ? 50 : 0);

      return (
        <div className="stepper" aria-label="Setup progress">
          <div className={"step " + (s1Done ? 'done' : 'active')}>
            <div className="bubble">{s1Done ? '✓' : '1'}</div>
            <div className="lbl">Jira</div>
          </div>
          <div className="step-bar"><div className="fill" style={{width: fill1 + '%'}} /></div>
          <div className={"step " + (s2Done ? 'done' : (s2Active || s2Connecting ? 'active' : ''))}>
            <div className="bubble">{s2Done ? '✓' : '2'}</div>
            <div className="lbl">Google</div>
          </div>
          <div className="step-bar"><div className="fill" style={{width: fill2 + '%'}} /></div>
          <div className={"step " + (s3Active ? 'active' : '')}>
            <div className="bubble">{s3Active ? '✓' : '3'}</div>
            <div className="lbl">Done</div>
          </div>
        </div>
      );
    }

    function ConnectionRow({
      kind,           // 'jira' | 'google'
      title,
      reason,
      status,         // 'idle' | 'connecting' | 'connected' | 'expired'
      account,        // email or workspace
      onConnect,
    }) {
      const rowCls =
        status === 'connected' ? 'row connected' :
        status === 'expired'   ? 'row expired'   :
        'row';

      const pip =
        status === 'connected' ? '✓' :
        status === 'expired'   ? '!' :
        '·';

      const Tag = () => {
        if (status === 'connected') return <span className="tag ok">Connected</span>;
        if (status === 'expired')   return <span className="tag warn">Reconnect</span>;
        return <span className="tag req">Required</span>;
      };

      const Btn = () => {
        if (status === 'connecting') {
          return (
            <button className="btn btn--primary" disabled>
              <span className="spin" />
              <span>Connecting…</span>
            </button>
          );
        }
        if (status === 'connected') {
          return <button className="btn btn--ghost" onClick={onConnect}>Manage</button>;
        }
        if (status === 'expired') {
          return (
            <button className="btn btn--warn" onClick={onConnect}>
              Reconnect
            </button>
          );
        }
        return (
          <button className="btn btn--primary" onClick={onConnect}>
            Connect {kind === 'jira' ? 'Jira' : 'Google'}
          </button>
        );
      };

      return (
        <div className={rowCls} data-comment-anchor={"conn-row-" + kind}>
          <div className={"ico ico--" + kind} aria-hidden="true">
            {kind === 'jira' ? 'J' : 'G'}
            <span className="pip">{pip}</span>
          </div>
          <div className="body">
            <div className="title-line">
              <div className="title">{title}</div>
              <Tag />
            </div>
            <div className="reason">{reason}</div>
            {status === 'connected' && account && (
              <div className="conn-info">
                <span className="check">✓</span>
                <span>Connected as</span>
                <span className="email">{account}</span>
              </div>
            )}
            {status === 'expired' && account && (
              <div className="conn-info">
                <span className="warn-dot">!</span>
                <span>Token expired for</span>
                <span className="email">{account}</span>
              </div>
            )}
          </div>
          <div className="btn-cell"><Btn /></div>
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const ist = useISTClock();
      const [local, setLocal] = useState(null);   // override scenario locally on click

      useEffect(() => { setLocal(null); }, [t.scenario]);

      const scenario = local ?? t.scenario;
      const conn = deriveState(scenario);

      // mock account labels
      const jiraAcct = 'aarav@iksula.atlassian.net';
      const gAcct = t.userEmail;
      const bothReady = conn.jira === 'connected' && conn.google === 'connected';

      const onJiraConnect = () => {
        if (conn.jira === 'connected') return;
        // pretend to connect immediately
        setLocal(conn.google === 'connected' ? 'all-connected' : 'jira-only');
      };
      const onGoogleConnect = () => {
        if (conn.google === 'connected') return;
        // simulate connecting
        setLocal('connecting');
        setTimeout(() => setLocal('all-connected'), 1600);
      };

      const onFinish = () => {
        if (!bothReady) return;
        // playful: small celebration then no-op
        const root = document.getElementById('app');
        root.animate(
          [{ filter: 'brightness(1)' }, { filter: 'brightness(1.05)' }, { filter: 'brightness(1)' }],
          { duration: 500 }
        );
      };

      const isPhoto = t.background === 'photo';
      const bgClass =
        t.background === 'grid'  ? 'bg-grid'  :
        t.background === 'rings' ? 'bg-rings' :
        t.background === 'mesh'  ? 'bg-mesh'  :
        t.background === 'photo' ? 'bg-photo' :
        t.background === 'plain' ? '' :
        'bg-dots';

      return (
        <React.Fragment>
          {!isPhoto && <div className="bg-layer bg-glow" />}
          {bgClass && <div className={"bg-layer " + bgClass} />}
          {isPhoto && <div className="bg-layer bg-photo-overlay" />}

          <div className="chrome">
            <div className="chrome-tl">
              <a href="Sign%20In.html" className="wordmark" style={{textDecoration:'none'}}>
                <span className="dot"></span>
                AutoClock
              </a>
            </div>
            <div className="chrome-tr">
              <span className="status-line">
                <span className="pulse"></span>
                <span className="domain-tag">setup · step 1 of 3</span>
                <span className="domain-tag" style={{opacity:.45}}>•</span>
                <span>IST&nbsp;{ist.hm}<span className="ist-seconds">:{ist.s}</span></span>
              </span>
            </div>
            <div className="chrome-bl">
              <div className="footer-line">
                <strong>You're almost in.</strong>{' '}
                Both connections are required to start logging.
              </div>
            </div>
            <div className="chrome-br">
              <span className="user-chip">
                <span className="avatar">{initials(t.userName)}</span>
                <span>{t.userName.split(' ')[0]}</span>
                <a href="Sign%20In.html" className="signout">Sign out</a>
              </span>
            </div>
          </div>

          <div className="center">
            <div className="stack">
              <div className="head">
                <div className="eyebrow">
                  <span className="dash"></span>
                  <span>One-time setup</span>
                  <span className="dash"></span>
                </div>
                <h1 className="h1">Connect your accounts</h1>
                <p className="sub">
                  AutoClock posts your day to Jira, Google Sheets &amp; Gmail — under your name,
                  with your permissions. Connect once, log every day in one click.
                </p>
                <Stepper jira={conn.jira} google={conn.google} />
              </div>

              <div className="card">
                <div className="rows">
                  <ConnectionRow
                    kind="jira"
                    title="Jira"
                    reason="So your worklogs post under your name."
                    status={conn.jira}
                    account={jiraAcct}
                    onConnect={onJiraConnect}
                  />
                  <ConnectionRow
                    kind="google"
                    title="Google Workspace"
                    reason="So AutoClock can update your timesheet and draft your end-of-day email."
                    status={conn.google}
                    account={gAcct}
                    onConnect={onGoogleConnect}
                  />
                </div>

                <div className="reassure">
                  <span className="shield">🔒︎</span>
                  <span>
                    AutoClock <strong style={{color:'var(--ac-text)'}}>never tracks your activity in the background</strong> —
                    it only stores what you type. Tokens stay on Iksula's servers.
                  </span>
                </div>

                <div className="card-footer">
                  <div className={"meta " + (bothReady ? '' : 'not-ready')}>
                    <span className="dotty"></span>
                    <span>
                      {bothReady
                        ? 'All set — ready to log your first day.'
                        : `Waiting on ${conn.jira !== 'connected' ? 'Jira' : 'Google'}…`}
                    </span>
                  </div>
                  <button
                    className="btn btn--primary finish-btn"
                    disabled={!bothReady}
                    onClick={onFinish}
                  >
                    <span>Finish setup</span>
                    <span className="arrow">→</span>
                  </button>
                </div>
              </div>

              {t.showSkip && (
                <div className="skip-line">
                  Trouble connecting? <a href="#">Ask IT for help</a> · or
                  {' '}<a href="#">do this later</a>.
                </div>
              )}
            </div>
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Scenario">
              <TweakSelect
                label="Connection state"
                value={t.scenario}
                options={[
                  { value: 'none',          label: 'Nothing connected' },
                  { value: 'jira-only',     label: 'Jira connected, Google pending' },
                  { value: 'connecting',    label: 'Google connecting…' },
                  { value: 'all-connected', label: 'Both connected — ready' },
                  { value: 'reconnect',     label: 'Google token expired' },
                ]}
                onChange={(v) => setTweak('scenario', v)}
              />
            </TweakSection>

            <TweakSection title="Canvas">
              <TweakSelect
                label="Background"
                value={t.background}
                options={[
                  { value: 'photo', label: 'Soft aurora (image)' },
                  { value: 'dots',  label: 'Dot grid' },
                  { value: 'grid',  label: 'Line grid' },
                  { value: 'rings', label: 'Clock rings' },
                  { value: 'mesh',  label: 'Soft mesh' },
                  { value: 'plain', label: 'Plain' },
                ]}
                onChange={(v) => setTweak('background', v)}
              />
            </TweakSection>

            <TweakSection title="Identity">
              <TweakText
                label="Name"
                value={t.userName}
                onChange={(v) => setTweak('userName', v)}
              />
              <TweakText
                label="Email"
                value={t.userEmail}
                onChange={(v) => setTweak('userEmail', v)}
              />
            </TweakSection>

            <TweakSection title="Details">
              <TweakToggle
                label="Show 'Ask IT / do this later' line"
                value={t.showSkip}
                onChange={(v) => setTweak('showSkip', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
