<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AutoClock · Sign in</title>
<link rel="stylesheet" href="autoclock-theme.css" />
<style>
  /* ---------- page shell ---------- */
  html, body { height: 100%; }
  body {
    background: var(--ac-bg);
    color: var(--ac-text);
    overflow: hidden;
  }
  #app { height: 100vh; width: 100vw; }

  /* ---------- chrome (corners) ---------- */
  .chrome {
    position: absolute; inset: 0;
    pointer-events: none;
    padding: var(--ac-space-8);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr auto;
    z-index: 2;
  }
  .chrome > * { pointer-events: auto; }
  .chrome-tl { grid-column: 1; grid-row: 1; }
  .chrome-tr { grid-column: 2; grid-row: 1; justify-self: end; }
  .chrome-bl { grid-column: 1; grid-row: 3; align-self: end; }
  .chrome-br { grid-column: 2; grid-row: 3; align-self: end; justify-self: end; }

  .wordmark {
    display: inline-flex; align-items: center; gap: 9px;
    font-weight: var(--ac-weight-black);
    font-size: var(--ac-text-base);
    letter-spacing: -0.01em;
    color: var(--ac-text);
  }
  .wordmark .dot {
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--ac-secondary);
    box-shadow: 0 0 0 4px rgba(220,38,38,.10);
  }

  .status-line {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--ac-font-mono);
    font-size: var(--ac-text-xs);
    color: var(--ac-text);
    letter-spacing: 0.02em;
    font-weight: var(--ac-weight-bold);
    text-shadow: 0 1px 2px rgba(255,255,255,.55);
  }
  .status-line .pulse {
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--ac-success);
    box-shadow: 0 0 0 0 rgba(16,185,129,.6);
    animation: pulse 2.4s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(16,185,129,.55); }
    70%  { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
    100% { box-shadow: 0 0 0 0   rgba(16,185,129,0); }
  }

  .footer-line {
    font-size: var(--ac-text-xs);
    color: var(--ac-text);
    font-weight: var(--ac-weight-semibold);
    text-shadow: 0 1px 2px rgba(255,255,255,.55);
  }
  .footer-line strong { color: var(--ac-primary); font-weight: var(--ac-weight-black); }

  .kbd-hint {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--ac-font-mono);
    font-size: var(--ac-text-xs);
    color: var(--ac-text);
    font-weight: var(--ac-weight-bold);
    text-shadow: 0 1px 2px rgba(255,255,255,.55);
  }
  .kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 22px; padding: 0 6px;
    background: var(--ac-surface);
    border: 1px solid var(--ac-border-strong);
    border-bottom-width: 2px;
    border-radius: 6px;
    font-family: var(--ac-font-mono);
    font-size: 11px; font-weight: 600;
    color: var(--ac-text-muted);
  }

  /* ---------- backgrounds ---------- */
  .bg-layer { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

  /* base wash — always on. Soft warm tone + faint brand spark. */
  .bg-glow {
    background:
      radial-gradient(circle at 50% 30%, rgba(255,255,255,.85) 0%, rgba(255,255,255,0) 55%),
      radial-gradient(circle at 12% 88%, rgba(37,99,235,.05)  0%, rgba(37,99,235,0)  45%),
      radial-gradient(circle at 88% 92%, rgba(220,38,38,.045) 0%, rgba(220,38,38,0) 45%);
  }

  .bg-dots {
    background-image:
      radial-gradient(circle at 1px 1px, rgba(15,23,42,.08) 1px, transparent 0);
    background-size: 22px 22px;
    -webkit-mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, #000 30%, transparent 85%);
            mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, #000 30%, transparent 85%);
  }
  .bg-grid {
    background-image:
      linear-gradient(rgba(15,23,42,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15,23,42,.05) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 30%, transparent 80%);
            mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 30%, transparent 80%);
  }
  /* concentric clock-face rings — a quiet brand allusion */
  .bg-rings {
    background:
      repeating-radial-gradient(
        circle at 50% 50%,
        transparent 0,
        transparent 79px,
        rgba(15,23,42,.05) 79px,
        rgba(15,23,42,.05) 80px
      );
    -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 0%, rgba(0,0,0,.85) 35%, transparent 75%);
            mask-image: radial-gradient(circle at 50% 50%, #000 0%, rgba(0,0,0,.85) 35%, transparent 75%);
  }

  /* photographic soft aurora — generated PNG */
  .bg-photo {
    background-image: url('assets/bg-soft.png');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
  }
  /* a faint white wash on top of the photo so card contrast stays high */
  .bg-photo-overlay {
    background:
      radial-gradient(ellipse 50% 45% at 50% 45%, rgba(255,255,255,.45) 0%, rgba(255,255,255,0) 70%);
  }
  /* organic colour mesh — soft, restrained, on-palette */
  .bg-mesh {
    background:
      radial-gradient(40% 35% at 18% 22%, rgba(37,99,235,.10) 0%, transparent 60%),
      radial-gradient(35% 30% at 82% 18%, rgba(220,38,38,.08) 0%, transparent 60%),
      radial-gradient(50% 40% at 50% 95%, rgba(15,23,42,.08) 0%, transparent 65%),
      radial-gradient(30% 25% at 90% 70%, rgba(16,185,129,.06) 0%, transparent 60%);
    filter: saturate(.95);
  }

  /* tiny twinkle dots — four pinpoints to add depth, never moves */
  .bg-stars::before,
  .bg-stars::after {
    content: ""; position: absolute;
    width: 4px; height: 4px; border-radius: 999px;
    background: var(--ac-secondary);
    opacity: .35;
  }
  .bg-stars::before { top: 18%; left: 12%; }
  .bg-stars::after  { top: 72%; right: 14%; background: var(--ac-info); opacity: .25; }

  /* ---------- center stack ---------- */
  .center {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    z-index: 1;
    padding: 32px;
  }
  .stack {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: var(--ac-space-5);
  }

  /* ---------- card ---------- */
  .card {
    background: var(--ac-surface);
    border: 1px solid var(--ac-border);
    border-radius: 20px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.6) inset,
      0 1px 2px rgba(15,23,42,.04),
      0 24px 60px -28px rgba(15,23,42,.25);
    padding: 36px 36px 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    /* subtle top hairline accent */
    content: ""; position: absolute; left: 28px; right: 28px; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(15,23,42,.18), transparent);
  }

  /* logomark — built from primitives only */
  .logomark {
    width: 56px; height: 56px;
    background: var(--ac-primary);
    border-radius: 14px;
    margin: 0 auto;
    display: grid; place-items: center;
    position: relative;
    box-shadow: 0 6px 18px -8px rgba(15,23,42,.6);
  }
  .logomark::after {
    /* tiny corner notch — a small white square = "the moment" */
    content: ""; position: absolute;
    top: 9px; right: 9px;
    width: 5px; height: 5px; border-radius: 1px;
    background: var(--ac-secondary);
  }
  .logomark .face {
    width: 26px; height: 26px;
    border-radius: 999px;
    border: 1.6px solid rgba(255,255,255,.85);
    position: relative;
  }
  .logomark .hand {
    position: absolute;
    left: 50%; top: 50%;
    width: 1.6px; height: 10px;
    background: #fff;
    border-radius: 1px;
    transform-origin: 50% 100%;
    transform: translate(-50%, -100%) rotate(36deg);
  }
  .logomark .pivot {
    position: absolute; left: 50%; top: 50%;
    width: 3px; height: 3px; border-radius: 999px;
    background: var(--ac-secondary);
    transform: translate(-50%, -50%);
  }

  .brand-name {
    margin-top: 18px;
    font-size: 26px;
    font-weight: var(--ac-weight-black);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .tagline {
    margin-top: 8px;
    font-size: var(--ac-text-base);
    color: var(--ac-text-muted);
    line-height: 1.45;
  }

  /* google button */
  .gbtn {
    margin-top: 26px;
    width: 100%;
    height: 48px;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 12px;
    background: var(--ac-primary);
    color: var(--ac-primary-contrast);
    border: 1px solid var(--ac-primary);
    border-radius: 12px;
    font-family: var(--ac-font-sans);
    font-size: 15px;
    font-weight: var(--ac-weight-semibold);
    cursor: pointer;
    transition: background var(--ac-transition), transform var(--ac-transition), box-shadow var(--ac-transition);
    box-shadow: 0 6px 18px -10px rgba(15,23,42,.6);
    position: relative;
  }
  .gbtn:hover:not(:disabled) { background: var(--ac-primary-hover); }
  .gbtn:active:not(:disabled) { transform: translateY(1px); }
  .gbtn:disabled { cursor: progress; opacity: .92; }
  .gbtn .g-disc {
    width: 22px; height: 22px;
    background: #fff;
    border-radius: 999px;
    display: grid; place-items: center;
    flex: none;
  }
  .gbtn .g-glyph {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 14px;
    background: linear-gradient(135deg, #4285F4 0%, #34A853 35%, #FBBC05 65%, #EA4335 100%);
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .gbtn .label { line-height: 1; }
  .gbtn .shortcut {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    font-family: var(--ac-font-mono); font-size: 11px;
    color: rgba(255,255,255,.55);
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 5px;
    padding: 2px 6px;
    line-height: 1;
  }

  /* spinner state */
  .spinner {
    width: 18px; height: 18px;
    border-radius: 999px;
    border: 2px solid rgba(255,255,255,.25);
    border-top-color: #fff;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .helper {
    margin-top: 14px;
    font-family: var(--ac-font-mono);
    font-size: var(--ac-text-sm);
    color: var(--ac-text-subtle);
  }
  .helper .at { color: var(--ac-text-muted); }

  /* divider + connects */
  .connects {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px dashed var(--ac-border-strong);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    flex-wrap: nowrap;
  }
  .connects .label {
    font-size: var(--ac-text-xs);
    font-weight: var(--ac-weight-bold);
    letter-spacing: var(--ac-tracking-wide);
    text-transform: uppercase;
    color: var(--ac-text-subtle);
    margin-right: 4px;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--ac-n-100);
    color: var(--ac-text-muted);
    font-size: var(--ac-text-xs);
    font-weight: var(--ac-weight-semibold);
    padding: 4px 8px;
    border-radius: 999px;
    border: 1px solid var(--ac-border);
    white-space: nowrap;
  }
  .pill .swatch {
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--ac-text-subtle);
  }
  .pill .swatch--jira  { background: #2684FF; }
  .pill .swatch--sheet { background: #0F9D58; }
  .pill .swatch--gmail { background: #EA4335; }

  /* error banner */
  .err {
    margin-top: 14px;
    display: flex; align-items: flex-start; gap: 10px;
    text-align: left;
    padding: 11px 13px;
    background: var(--ac-danger-soft);
    border: 1px solid #FECACA;
    color: var(--ac-danger-text);
    border-radius: 12px;
    font-size: 13px;
  }
  .err .ico {
    width: 18px; height: 18px; border-radius: 999px;
    background: var(--ac-danger); color: #fff;
    display: grid; place-items: center;
    font-family: var(--ac-font-mono); font-weight: 700; font-size: 12px;
    flex: none;
  }
  .err strong { font-weight: var(--ac-weight-bold); }
  .err .domain { font-family: var(--ac-font-mono); }

  /* first-run helper card (under main card) */
  .helper-card {
    background: var(--ac-surface);
    border: 1px solid var(--ac-border);
    border-radius: 14px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 2px rgba(15,23,42,.03);
  }
  .helper-card .ico {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--ac-n-100);
    color: var(--ac-text-muted);
    display: grid; place-items: center;
    font-family: var(--ac-font-mono); font-weight: 700;
    font-size: 13px;
  }
  .helper-card .title { font-size: 13px; font-weight: var(--ac-weight-semibold); color: var(--ac-text); }
  .helper-card .sub { font-size: 12px; color: var(--ac-text-muted); margin-top: 2px; }
  .helper-card .arrow {
    font-family: var(--ac-font-mono); font-size: 14px;
    color: var(--ac-text-subtle);
  }

  /* ---------- entry animation ---------- */
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card, .helper-card, .chrome-tl, .chrome-tr, .chrome-bl, .chrome-br {
    animation: rise 600ms ease both;
  }
  .helper-card { animation-delay: 120ms; }
  .chrome > * { animation-delay: 220ms; }

  /* short viewports — hide the decorative bottom chrome so it can't
     collide with the center stack. Top chrome (brand + status) stays. */
  @media (max-height: 720px), (max-width: 720px) {
    .chrome-bl, .chrome-br { display: none; }
  }

  /* tablet / small laptop */
  @media (max-width: 640px) {
    .chrome { padding: 18px; }
    .center { padding: 20px; }
    .stack { gap: var(--ac-space-4); }
    .card { padding: 30px 24px 24px; border-radius: 18px; }
    .brand-name { font-size: 24px; margin-top: 16px; }
    .tagline { font-size: 13.5px; }
    .gbtn { margin-top: 22px; height: 46px; font-size: 14.5px; }
    .connects { flex-wrap: wrap; padding-top: 14px; margin-top: 18px; }
  }

  /* phone */
  @media (max-width: 480px) {
    .chrome { padding: 14px; }
    .center { padding: 16px; }
    .card { padding: 26px 20px 22px; border-radius: 16px; }
    .logomark { width: 48px; height: 48px; border-radius: 12px; }
    .logomark .face { width: 22px; height: 22px; }
    .logomark .hand { height: 8px; }
    .brand-name { font-size: 22px; margin-top: 14px; }
    .tagline { font-size: 13px; margin-top: 6px; }
    .gbtn { height: 44px; font-size: 14px; gap: 10px; }
    .gbtn .shortcut { display: none; }
    .helper { font-size: 12px; margin-top: 12px; }
    .err { font-size: 12.5px; padding: 10px 12px; }
    .connects .label { width: 100%; text-align: center; margin: 0 0 4px; }
    .helper-card { padding: 12px 14px; gap: 10px; }
    .helper-card .title { font-size: 12.5px; }
    .helper-card .sub { font-size: 11.5px; }
    .helper-card .arrow { display: none; }
    /* shorten the top-right status pill on phones */
    .status-line .ist-seconds { display: none; }
  }

  /* very narrow */
  @media (max-width: 360px) {
    .status-line .domain-tag { display: none; }
    .brand-name { font-size: 20px; }
  }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ---------- defaults the host can persist ---------- */
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "state": "default",
      "background": "photo",
      "showFirstRun": false,
      "showConnects": true,
      "showShortcut": true
    }/*EDITMODE-END*/;

    /* ---------- live IST clock ---------- */
    function useISTClock() {
      const [now, setNow] = useState(() => new Date());
      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(id);
      }, []);
      const hm = new Intl.DateTimeFormat('en-IN', {
        timeZone: 'Asia/Kolkata',
        hour: '2-digit', minute: '2-digit', hour12: false
      }).format(now);
      const s = new Intl.DateTimeFormat('en-IN', {
        timeZone: 'Asia/Kolkata',
        second: '2-digit'
      }).format(now);
      return { hm, s };
    }

    function Logomark() {
      return (
        <div className="logomark" aria-hidden="true">
          <div className="face">
            <div className="hand"></div>
            <div className="pivot"></div>
          </div>
        </div>
      );
    }

    function GoogleButton({ state, showShortcut, onClick }) {
      const loading = state === 'loading';
      const label =
        loading ? 'Signing you in…' :
        state === 'error' ? 'Try a different account' :
        'Sign in with Google';
      return (
        <button
          className="gbtn"
          onClick={onClick}
          disabled={loading}
          aria-busy={loading}
        >
          {loading ? (
            <span className="spinner" aria-hidden="true" />
          ) : (
            <span className="g-disc" aria-hidden="true">
              <span className="g-glyph">G</span>
            </span>
          )}
          <span className="label">{label}</span>
          {!loading && showShortcut && <span className="shortcut">G</span>}
        </button>
      );
    }

    function ErrorBanner() {
      return (
        <div className="err" role="alert">
          <span className="ico">!</span>
          <div>
            <strong>That account isn't eligible.</strong>{' '}
            AutoClock is internal to Iksula — please sign in with your{' '}
            <span className="domain">@iksula.com</span> account.
          </div>
        </div>
      );
    }

    function FirstRunHelper() {
      return (
        <div className="helper-card" role="note">
          <div className="ico">1·2·3</div>
          <div>
            <div className="title">First time here?</div>
            <div className="sub">Sign in, connect Jira &amp; Google once, then log your day in one click.</div>
          </div>
          <div className="arrow">↘</div>
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const ist = useISTClock();
      const [localState, setLocalState] = useState(null); // override on click

      // sync local with tweak when tweak changes
      useEffect(() => { setLocalState(null); }, [t.state]);

      const effectiveState = localState ?? t.state;

      const onSignIn = () => {
        if (effectiveState === 'loading') return;
        setLocalState('loading');
        setTimeout(() => {
          // bounce back to whatever tweak says (default), so it's demo-friendly
          setLocalState(null);
        }, 1800);
      };

      // keyboard: G triggers sign-in
      useEffect(() => {
        const onKey = (e) => {
          if (e.key && e.key.toLowerCase() === 'g' && !e.metaKey && !e.ctrlKey && !e.altKey) {
            const tag = (document.activeElement && document.activeElement.tagName) || '';
            if (tag === 'INPUT' || tag === 'TEXTAREA') return;
            onSignIn();
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [effectiveState]);

      const isPhoto = t.background === 'photo';
      const bgClass =
        t.background === 'grid'  ? 'bg-grid'  :
        t.background === 'rings' ? 'bg-rings' :
        t.background === 'mesh'  ? 'bg-mesh'  :
        t.background === 'photo' ? 'bg-photo' :
        t.background === 'plain' ? '' :
        'bg-dots';

      return (
        <React.Fragment>
          {/* backgrounds — layered */}
          {!isPhoto && <div className="bg-layer bg-glow" />}
          {bgClass && <div className={"bg-layer " + bgClass} />}
          {isPhoto && <div className="bg-layer bg-photo-overlay" />}
          {!isPhoto && <div className="bg-layer bg-stars" />}

          {/* corners */}
          <div className="chrome">
            <div className="chrome-tl">
              <span className="wordmark">
                <span className="dot"></span>
                AutoClock
              </span>
            </div>
            <div className="chrome-tr">
              <span className="status-line">
                <span className="pulse"></span>
                <span className="domain-tag">iksula · internal</span>
                <span className="domain-tag" style={{opacity:.45}}>•</span>
                <span>IST&nbsp;{ist.hm}<span className="ist-seconds">:{ist.s}</span></span>
              </span>
            </div>
            <div className="chrome-bl">
              <div className="footer-line">
                <strong>An internal Iksula tool.</strong>{' '}
                Logs flow to Jira, Google Sheets &amp; Gmail — never elsewhere.
              </div>
            </div>
            <div className="chrome-br">
              <span className="kbd-hint">
                <span>press</span>
                <span className="kbd">G</span>
                <span>to sign in</span>
              </span>
            </div>
          </div>

          {/* center */}
          <div className="center">
            <div className="stack">
              <div className="card" data-comment-anchor="signin-card">
                <Logomark />
                <h1 className="brand-name">AutoClock</h1>
                <p className="tagline">Log your whole workday in one click.</p>

                <GoogleButton
                  state={effectiveState}
                  showShortcut={t.showShortcut}
                  onClick={onSignIn}
                />

                <div className="helper">
                  Use your <span className="at">@iksula.com</span> account
                </div>

                {effectiveState === 'error' && <ErrorBanner />}

                {t.showConnects && (
                  <div className="connects" aria-label="Connects to">
                    <span className="label">Connects</span>
                    <span className="pill"><span className="swatch swatch--jira"></span>Jira</span>
                    <span className="pill"><span className="swatch swatch--sheet"></span>Google Sheets</span>
                    <span className="pill"><span className="swatch swatch--gmail"></span>Gmail</span>
                  </div>
                )}
              </div>

              {t.showFirstRun && <FirstRunHelper />}
            </div>
          </div>

          {/* tweaks */}
          <TweaksPanel title="Tweaks">
            <TweakSection title="State">
              <TweakRadio
                label="Screen state"
                value={t.state}
                options={[
                  { value: 'default', label: 'Default' },
                  { value: 'loading', label: 'Loading' },
                  { value: 'error',   label: 'Error' },
                ]}
                onChange={(v) => setTweak('state', v)}
              />
            </TweakSection>

            <TweakSection title="Canvas">
              <TweakSelect
                label="Background"
                value={t.background}
                options={[
                  { value: 'photo', label: 'Soft aurora (image)' },
                  { value: 'dots',  label: 'Dot grid' },
                  { value: 'grid',  label: 'Line grid' },
                  { value: 'rings', label: 'Clock rings' },
                  { value: 'mesh',  label: 'Soft mesh' },
                  { value: 'plain', label: 'Plain' },
                ]}
                onChange={(v) => setTweak('background', v)}
              />
            </TweakSection>

            <TweakSection title="Details">
              <TweakToggle
                label="Show first-run helper"
                value={t.showFirstRun}
                onChange={(v) => setTweak('showFirstRun', v)}
              />
              <TweakToggle
                label='Show "Connects" pills'
                value={t.showConnects}
                onChange={(v) => setTweak('showConnects', v)}
              />
              <TweakToggle
                label="Show keyboard shortcut"
                value={t.showShortcut}
                onChange={(v) => setTweak('showShortcut', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
