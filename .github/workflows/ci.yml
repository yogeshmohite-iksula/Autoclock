name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + tests
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci || npm install
      - run: npm test

  web:
    name: Web — build + smoke E2E (Playwright CLI)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci || npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      # E2E runs only when the backend is also available — skipped in CI for M0; uncomment in M1.
      # - run: npx playwright test --reporter=list

  security:
    name: Security — gitleaks + npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
      - name: npm audit (backend)
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high || true
      - name: npm audit (web)
        working-directory: web
        run: npm audit --omit=dev --audit-level=high || true
