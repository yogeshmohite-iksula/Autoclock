# AutoClock — Fly.io app config.
# Region: bom (Mumbai) — ~6 ms from IST users.
# SQLite on a persistent volume mounted at /data (autoclock_data).
# auto_stop_machines = false keeps node-cron alive for Fri/Mon compliance jobs.
#
# One-time setup:
#   fly apps create autoclock-iksula
#   fly volumes create autoclock_data --region bom --size 3
#   fly secrets set DB_FILE=/data/autoclock.db SESSION_SECRET=... TOKEN_ENC_KEY=... (etc.)
#   fly deploy

app            = "autoclock-iksula"
primary_region = "bom"

[build]

[env]
  PORT        = "4000"
  NODE_ENV    = "production"
  ENABLE_CRON = "true"

[mounts]
  source      = "autoclock_data"
  destination = "/data"

[[services]]
  internal_port       = 4000
  protocol            = "tcp"
  auto_stop_machines  = false   # CRITICAL — keeps node-cron Fri/Mon jobs running
  min_machines_running = 1

  [[services.ports]]
    port     = 80
    handlers = ["http"]
    [services.ports.force_https]
      enabled = true

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "30s"
    method       = "get"
    path         = "/api/health"
