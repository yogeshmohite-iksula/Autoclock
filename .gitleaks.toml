# gitleaks — secret scanning for AutoClock
# Run: gitleaks detect --source . --redact

title = "AutoClock gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "jira-api-token"
description = "Jira API token (basic-auth, base64'd email:token pairs)"
regex = '''ATATT[A-Za-z0-9_=-]{20,}'''
keywords = ["jira", "atlassian"]

[[rules]]
id = "google-oauth-client-secret"
description = "Google OAuth client secret"
regex = '''GOCSPX-[A-Za-z0-9_-]{20,}'''
keywords = ["GOCSPX", "client_secret"]

[[rules]]
id = "google-refresh-token"
description = "Google OAuth refresh token"
regex = '''1//[A-Za-z0-9_-]{40,}'''
keywords = ["refresh_token"]

[[rules]]
id = "github-pat"
description = "GitHub personal access token"
regex = '''ghp_[A-Za-z0-9]{36,}|github_pat_[A-Za-z0-9_]{82,}'''
keywords = ["ghp_", "github_pat_"]

[allowlist]
description = "Files that may contain example placeholders"
paths = [
  '''\.env\.example$''',
  '''docs/.*\.md$''',
  '''README\.md$''',
  '''CLAUDE\.md$''',
]
